<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AeroTax — AI-Powered CA Alternative for instant Indian tax optimization, audit detection, and invoice processing." />
  <meta name="theme-color" content="#00e5ff" />
  <title>AeroTax — AI-Powered CA</title>

  <!-- Trunk picks up these data-trunk directives automatically -->
  <link data-trunk rel="rust" data-bin="aerotax" />
  <link data-trunk rel="css" href="styles/aerotax.css" data-no-sri />

  <!-- Favicon (emoji fallback) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <!-- Leptos mounts here via mount_to_body() -->
  <!-- Loading splash (hidden once WASM loads) -->
  <div id="wasm-loading" style="
    position: fixed; inset: 0;
    background: #020408;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; z-index: 9999;
    font-family: 'Space Grotesk', sans-serif;
    color: #00e5ff;
  ">
    <div style="font-size: 3rem;">⚡</div>
    <div style="font-size: 1.5rem; font-weight: 700;">AeroTax</div>
    <div style="font-size: 0.8rem; color: #3d5a75; letter-spacing: 0.2em;">LOADING WASM ENGINE...</div>
  </div>

  <script>
    // Hide loading splash once WASM module initializes
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const shell = document.querySelector('.aerotax-shell');
        if (shell) {
          document.getElementById('wasm-loading').style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });

    // Production API URL Hook
    // When deployed, this should point to your Render backend URL
    window.AEROTAX_API_URL = window.AEROTAX_API_URL || "http://localhost:8000";

    if (window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
      // Replace this with your actual Render URL (e.g., https://aerotax-backend.onrender.com)
      window.AEROTAX_API_URL = "https://aerotax-backend.onrender.com";
    }
    console.log("🚀 AeroTax API URL:", window.AEROTAX_API_URL);
  </script>
</body>
</html>
