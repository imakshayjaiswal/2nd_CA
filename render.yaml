services:
  - type: web
    name: aerotax-backend
    env: python
    buildCommand: |
      make build-engine
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: APP_ENV
        value: production
    rootDirectory: .
